name: Deriv SMC OB+FVG Scanner

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write   # required so the cooldown-file commit step can actually push

concurrency:
  group: smc-scanner
  cancel-in-progress: true   # prevents overlapping runs from racing on the cooldown file

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SMC Scanner
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python smc_scanner.py

      - name: Save cooldown file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add smc_cooldown.json || true
          git diff --staged --quiet || git commit -m "Update SMC cooldown"
          git pull --rebase || true
          git push || true
          
